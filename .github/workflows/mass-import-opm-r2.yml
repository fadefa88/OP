name: Mass Import One Man Punch Archive to R2

on:
  workflow_dispatch:
    inputs:
      from_chapter:
        description: "First One Man Punch chapter to import."
        required: true
        default: "1"
        type: string
      to_chapter:
        description: "Last One Man Punch chapter to import."
        required: true
        default: "1"
        type: string
      batch_size:
        description: "Commit JSON every N chapters."
        required: false
        default: "20"
        type: string
      max_pages:
        description: "Maximum image pages to keep per chapter."
        required: false
        default: "80"
        type: string
      min_pages:
        description: "Minimum valid manga pages required before accepting a chapter."
        required: false
        default: "3"
        type: string
      overwrite:
        description: "Overwrite manifest/R2 objects if chapters already exist."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: r2-import-runs
  cancel-in-progress: false

jobs:
  import:
    name: Mass import One Man Punch chapters to R2
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OPM_AUTHORIZED_MANGA_BASE_URL: ${{ vars.OPM_AUTHORIZED_MANGA_BASE_URL || 'https://onepiecepower.com/manga8/one-punch-man' }}
      OPM_AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.OPM_AUTHORIZED_MANGA_SOURCE_TEMPLATE }}
      OPM_SERIES_ID: "opm"
      OPM_SERIES_TITLE: "One Man Punch"
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Mass import by batches
        shell: bash
        run: |
          set -euo pipefail
          FROM=${{ github.event.inputs.from_chapter }}
          TO=${{ github.event.inputs.to_chapter }}
          BATCH=${{ github.event.inputs.batch_size }}
          MAX_PAGES=${{ github.event.inputs.max_pages }}
          MIN_PAGES=${{ github.event.inputs.min_pages }}
          OVERWRITE=${{ github.event.inputs.overwrite }}
          current=$FROM
          while [ "$current" -le "$TO" ]; do
            end=$((current + BATCH - 1))
            if [ "$end" -gt "$TO" ]; then end=$TO; fi
            EXTRA_ARGS=()
            if [ "$OVERWRITE" = "true" ]; then EXTRA_ARGS+=(--overwrite); fi
            python scripts/import_reader_series_to_r2.py \
              --from-chapter "$current" \
              --to-chapter "$end" \
              --max-pages "$MAX_PAGES" \
              --min-pages "$MIN_PAGES" \
              --webp-quality 82 \
              --image-strategy best-size \
              --i-confirm-rights \
              "${EXTRA_ARGS[@]}"
            if ! git diff --quiet -- public/content; then
              git config user.name "github-actions"
              git config user.email "github-actions@github.com"
              git add public/content
              git commit -m "Import One Man Punch chapters ${current}-${end} manifest"
              for attempt in 1 2 3; do
                if git push; then break; fi
                git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
                sleep $((attempt * 5))
              done
            else
              echo "No manifest changes for ${current}-${end}."
            fi
            current=$((end + 1))
          done
      - name: Deploy Cloudflare Worker after mass import
        run: npx wrangler deploy
