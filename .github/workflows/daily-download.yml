name: Scan New Chapter to R2 Hourly

on:
  schedule:
    # Every hour: refresh the latest published scans, then look for a new chapter.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      chapter:
        description: "Optional chapter number. Existing chapter = refresh; future chapter = import. Empty = refresh latest, then scan latest+1."
        required: false
        type: string
      scan_ahead:
        description: "How many future chapters to probe starting from latest+1."
        required: false
        default: "3"
        type: string
      max_pages:
        description: "Maximum pages to try per chapter."
        required: false
        default: "45"
        type: string
      min_pages:
        description: "Minimum pages required before accepting a chapter."
        required: false
        default: "3"
        type: string

permissions:
  contents: write

concurrency:
  group: r2-import-runs
  cancel-in-progress: false

jobs:
  scan:
    name: Refresh latest scans, check next chapter, upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AUTHORIZED_MANGA_BASE_URL: ${{ vars.AUTHORIZED_MANGA_BASE_URL }}
      AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.AUTHORIZED_MANGA_SOURCE_TEMPLATE }}
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      IMAGE_EXTENSIONS: "jpg,jpeg"
      WEBP_QUALITY: "82"
      IMAGE_STRATEGY: "best-size"
      STOP_AFTER_MISSING: "3"
      IMPORT_DELAY: "0.25"
      IMPORT_TIMEOUT: "15"
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || vars.NTFY_TOPIC || 'ldf-op-reader-cagnettoasd123' }}
      READER_BASE_URL: ${{ vars.READER_BASE_URL || 'https://manga.lucahome.uk' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTHORIZED_MANGA_BASE_URL:-}" ]; then
            echo "Missing repository variable AUTHORIZED_MANGA_BASE_URL. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${I_CONFIRM_RIGHTS:-}" != "true" ]; then
            echo "I_CONFIRM_RIGHTS is not true. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${R2_BUCKET_NAME:-}" ] || [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing R2_BUCKET_NAME or R2_PUBLIC_BASE_URL repository variable. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, or CLOUDFLARE_ACCOUNT_ID secret. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Refresh existing chapter if source scans changed
        if: steps.config.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER_INPUT="${{ github.event.inputs.chapter || '' }}"
          REFRESH_ARGS=()
          if [ -n "$CHAPTER_INPUT" ]; then
            REFRESH_ARGS+=(--chapter "$CHAPTER_INPUT")
          fi

          python scripts/refresh_latest_chapter_if_changed.py \
            --max-pages "${{ github.event.inputs.max_pages || '45' }}" \
            --min-pages "${{ github.event.inputs.min_pages || '3' }}" \
            --webp-quality "$WEBP_QUALITY" \
            --image-strategy "$IMAGE_STRATEGY" \
            --i-confirm-rights \
            "${REFRESH_ARGS[@]}"

      - name: Detect refreshed chapter
        id: refreshed
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f reports/latest-chapter-refresh-result.json ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "chapter=" >> "$GITHUB_OUTPUT"
            echo "changed_pages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          report = json.loads(Path("reports/latest-chapter-refresh-result.json").read_text(encoding="utf-8"))
          updated = bool(report.get("updated"))
          changed_pages = report.get("changedPages") or []
          print(f"updated={'true' if updated else 'false'}")
          print(f"chapter={report.get('chapter') or ''}")
          print(f"changed_pages={','.join(str(page) for page in changed_pages)}")
          PY

      - name: Import only a genuinely new chapter to R2
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER_INPUT="${{ github.event.inputs.chapter || '' }}"
          SCAN_AHEAD_INPUT="${{ github.event.inputs.scan_ahead || '3' }}"
          MAX_PAGES_INPUT="${{ github.event.inputs.max_pages || '45' }}"
          MIN_PAGES_INPUT="${{ github.event.inputs.min_pages || '3' }}"

          LATEST_CHAPTER=$(python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("public/content/index.json").read_text(encoding="utf-8"))
          series = next((item for item in data.get("series", []) if item.get("id") == "op"), {})
          print(int(series.get("latestChapter") or 0))
          PY
          )

          if [ -n "$CHAPTER_INPUT" ]; then
            if ! [[ "$CHAPTER_INPUT" =~ ^[0-9]+$ ]]; then
              echo "Invalid chapter input: $CHAPTER_INPUT" >&2
              exit 2
            fi

            if [ "$CHAPTER_INPUT" -le "$LATEST_CHAPTER" ]; then
              echo "Chapter $CHAPTER_INPUT already exists (latest: $LATEST_CHAPTER). Refresh step handled it; skipping new-chapter importer."
              python - "$CHAPTER_INPUT" "$LATEST_CHAPTER" <<'PY'
          import json
          import sys
          from pathlib import Path

          chapter = int(sys.argv[1])
          latest = int(sys.argv[2])
          path = Path("reports/new-chapter-result.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(
              json.dumps(
                  {
                      "imported": False,
                      "chapter": chapter,
                      "reason": f"chapter already exists; handled as refresh (latest={latest})",
                  },
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY
              exit 0
            fi

            EXTRA_ARGS=(--chapter "$CHAPTER_INPUT")
          else
            EXTRA_ARGS=(--scan-ahead "$SCAN_AHEAD_INPUT")
          fi

          python scripts/import_new_chapter_to_r2.py \
            --max-pages "$MAX_PAGES_INPUT" \
            --min-pages "$MIN_PAGES_INPUT" \
            --webp-quality "$WEBP_QUALITY" \
            --image-strategy "$IMAGE_STRATEGY" \
            --i-confirm-rights \
            "${EXTRA_ARGS[@]}"

      - name: Detect imported chapter
        id: imported
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f reports/new-chapter-result.json ]; then
            echo "No import report found."
            echo "imported=false" >> "$GITHUB_OUTPUT"
            echo "chapter=" >> "$GITHUB_OUTPUT"
            echo "volume=" >> "$GITHUB_OUTPUT"
            echo "pages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          report = json.loads(Path("reports/new-chapter-result.json").read_text(encoding="utf-8"))
          imported = bool(report.get("imported"))
          print(f"imported={'true' if imported else 'false'}")
          print(f"chapter={report.get('chapter') or ''}")
          print(f"volume={report.get('volume') or ''}")
          print(f"pages={report.get('pages') or ''}")
          PY

      - name: Commit JSON manifest changes only
        id: commit_json
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/content; then
            echo "No JSON manifest changes. No commit and no Cloudflare deploy."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Safety guard: never stage image binaries from any path.
          git add public/content/index.json public/content/manifest.json public/content/volumes/*.json

          if git diff --cached --quiet; then
            echo "No staged JSON changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHAPTER="${{ steps.imported.outputs.chapter }}"
          REFRESHED_CHAPTER="${{ steps.refreshed.outputs.chapter }}"
          IMPORTED="${{ steps.imported.outputs.imported }}"
          REFRESHED="${{ steps.refreshed.outputs.updated }}"

          if [ "$REFRESHED" = "true" ] && [ "$IMPORTED" = "true" ]; then
            git commit -m "Refresh manga chapter ${REFRESHED_CHAPTER} scans and import chapter ${CHAPTER}"
          elif [ "$REFRESHED" = "true" ] && [ -n "$REFRESHED_CHAPTER" ]; then
            git commit -m "Refresh manga chapter ${REFRESHED_CHAPTER} scans"
          elif [ "$IMPORTED" = "true" ] && [ -n "$CHAPTER" ]; then
            git commit -m "Import manga chapter ${CHAPTER} manifest"
          else
            git commit -m "Update manga chapter manifest"
          fi

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries."
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Deploy Cloudflare Worker after import or refresh
        if: steps.config.outputs.skip != 'true' && steps.commit_json.outputs.pushed == 'true'
        run: npx wrangler deploy

      - name: Notify ntfy for new chapter
        if: steps.config.outputs.skip != 'true' && steps.imported.outputs.imported == 'true' && steps.commit_json.outputs.pushed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER="${{ steps.imported.outputs.chapter }}"
          VOLUME="${{ steps.imported.outputs.volume }}"
          PAGES="${{ steps.imported.outputs.pages }}"
          BASE_URL="${READER_BASE_URL%/}"
          URL="${BASE_URL}/reader.html?series=op&chapter=chapter-${CHAPTER}&page=1"

          MESSAGE="Capitolo ${CHAPTER} appena caricato. Volume ${VOLUME}. Pagine: ${PAGES}. Tocca per leggerlo."

          curl -sS \
            -H "Title: Nuovo capitolo disponibile" \
            -H "Priority: high" \
            -H "Tags: pirate,book" \
            -H "Click: ${URL}" \
            -d "${MESSAGE}" \
            "https://ntfy.sh/${NTFY_TOPIC}"

          echo "ntfy notification sent for new chapter ${CHAPTER}."

      - name: Notify ntfy for updated chapter
        if: steps.config.outputs.skip != 'true' && steps.refreshed.outputs.updated == 'true' && steps.commit_json.outputs.pushed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER="${{ steps.refreshed.outputs.chapter }}"
          CHANGED_PAGES="${{ steps.refreshed.outputs.changed_pages }}"
          BASE_URL="${READER_BASE_URL%/}"
          URL="${BASE_URL}/reader.html?series=op&chapter=chapter-${CHAPTER}&page=1"

          if [ -n "$CHANGED_PAGES" ]; then
            MESSAGE="Capitolo ${CHAPTER} aggiornato. Pagine aggiornate: ${CHANGED_PAGES}. Tocca per rileggere la versione aggiornata."
          else
            MESSAGE="Capitolo ${CHAPTER} aggiornato con nuove immagini. Tocca per rileggere la versione aggiornata."
          fi

          curl -sS \
            -H "Title: Capitolo aggiornato" \
            -H "Priority: high" \
            -H "Tags: arrows_counterclockwise,book" \
            -H "Click: ${URL}" \
            -d "${MESSAGE}" \
            "https://ntfy.sh/${NTFY_TOPIC}"

          echo "ntfy notification sent for updated chapter ${CHAPTER}."
