<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Reader - © LDF</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="reader-body simplified-reader-body">
    <header class="reader-toolbar unified-reader-toolbar">
      <a class="reader-back" href="/">← Library</a>

      <div class="reader-title compact-reader-title">
        <strong id="reader-series">Caricamento…</strong>
        <small id="reader-chapter"></small>
      </div>

      <div class="reader-main-controls" aria-label="Selezione reader">
        <label>
          <span>Volume</span>
          <select id="reader-volume-select"></select>
        </label>
        <label>
          <span>Capitolo</span>
          <select id="reader-chapter-select"></select>
        </label>
        <span id="page-counter" class="reader-page-indicator">0 / 0</span>
        <button id="fullscreen-toggle" type="button" title="Apri a schermo intero">Schermo intero</button>
      </div>
    </header>

    <main class="reader-page-shell">
      <select id="reader-page-select" hidden aria-hidden="true"></select>

      <section class="single-reader-stage" aria-label="Pagina manga">
        <button id="prev-page" class="page-arrow page-arrow-left" type="button" aria-label="Pagina precedente">‹</button>

        <div id="single-page-view" class="single-page-view" aria-live="polite">
          <div id="reader-loading" class="reader-placeholder">Caricamento…</div>
          <img id="reader-image" alt="" draggable="false" />
        </div>

        <div id="fullscreen-hint" class="fullscreen-hint" hidden>Esci in basso a destra</div>
        <button id="fullscreen-exit" class="fullscreen-exit" type="button" hidden>Esci</button>

        <button id="next-page" class="page-arrow page-arrow-right" type="button" aria-label="Pagina successiva">›</button>
      </section>

      <section id="scroll-reader" class="scroll-reader" aria-label="Reader verticale" hidden></section>
    </main>

    <nav class="reader-hidden-nav" hidden aria-hidden="true">
      <a id="prev-chapter" href="#">Capitolo precedente</a>
      <a id="next-chapter" href="#">Capitolo successivo</a>
    </nav>

    <script type="module" src="/reader.js"></script>
  </body>
</html>
