<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>© LDF</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header compact-site-header">
      <a class="brand" href="/" aria-label="Vai alla home">
        <span class="brand-mark">LDF</span>
        <span>
          <strong>© LDF</strong>
        </span>
      </a>
      <nav class="top-nav" aria-label="Navigazione principale">
        <a href="#reader-picker">Reader</a>
        <a href="#library">Archivio</a>
      </nav>
    </header>

    <main>
      <section class="hero onepace-hero" aria-label="Ingresso reader">
        <div class="home-video-backdrop" aria-hidden="true">
          <video class="home-backdrop-video" role="presentation" tabindex="-1" autoplay muted loop playsinline webkit-playsinline preload="auto" poster="/media/backdrop-poster.jpg" disablepictureinpicture>
            <source src="/media/backdrop-loop.mp4" type="video/mp4" />
            <source src="/media/backdrop-loop.webm" type="video/webm" />
          </video>
        </div>

        <div class="hero-copy onepace-hero-copy">
          <p class="eyebrow">© LDF</p>
          <h1>The Definitive One Piece ITA Reading Experience</h1>
          <div class="hero-actions">
            <a id="continue-reading" class="button primary" href="#reader-picker">Continua lettura</a>
            <a class="button ghost" href="#reader-picker">Sfoglia archivio</a>
          </div>
        </div>
      </section>

      <section id="reader-picker" class="section picker-section compact-picker-section">
        <div class="section-head compact-section-head">
          <p class="eyebrow">Inizia a leggere</p>
          <h2>Seleziona volume e capitolo</h2>
        </div>

        <form id="reader-picker-form" class="reader-picker-card compact-reader-picker-card">
          <label>
            <span>Volume</span>
            <select id="volume-select" name="volume"></select>
          </label>
          <label>
            <span>Capitolo</span>
            <select id="chapter-select" name="chapter"></select>
          </label>
          <button class="button primary" type="submit">Apri capitolo</button>
        </form>

        <div class="library-tools compact-library-tools">
          <label class="search-box">
            <span>Cerca capitolo</span>
            <input id="chapter-search" type="search" placeholder="Es. 1176, volume 116…" autocomplete="off" />
          </label>
          <div class="library-stats" id="library-stats" aria-live="polite"></div>
        </div>
      </section>

      <section id="library" class="section compact-library-section">
        <div class="section-head inline-head compact-library-head">
          <div>
            <p class="eyebrow">Archivio</p>
            <h2 id="volume-title">Capitoli disponibili</h2>
          </div>
          <a id="latest-chapter" class="button ghost" href="#">Ultimo capitolo</a>
        </div>
        <div id="chapter-grid" class="chapter-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span id="copyright-label">© LDF 2026</span>
      <span id="last-updated-label">last updated --/--/----</span>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
