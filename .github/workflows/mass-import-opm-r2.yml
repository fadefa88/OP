name: Mass Import One Punch Man Archive to R2

on:
  workflow_dispatch:
    inputs:
      from_source_volume:
        description: "First source volume to scan."
        required: true
        default: "1"
        type: string
      to_source_volume:
        description: "Last source volume to scan."
        required: true
        default: "37"
        type: string
      total_chapters:
        description: "Target total OPM chapters to import."
        required: true
        default: "236"
        type: string
      max_source_chapters_per_volume:
        description: "Max /capitoloXX/ numbers to probe inside each volume."
        required: false
        default: "30"
        type: string
      max_pages:
        description: "Maximum pages to try per source chapter."
        required: false
        default: "80"
        type: string
      min_pages:
        description: "Minimum valid pages required before accepting a chapter."
        required: false
        default: "3"
        type: string
      overwrite:
        description: "Overwrite manifest/R2 objects if chapters already exist."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: r2-import-runs
  cancel-in-progress: false

jobs:
  import:
    name: Mass import One Punch Man source volumes to R2
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OPM_AUTHORIZED_MANGA_BASE_URL: ${{ vars.OPM_AUTHORIZED_MANGA_BASE_URL || 'https://onepiecepower.com/manga8/one-punch-man' }}
      OPM_AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.OPM_AUTHORIZED_MANGA_SOURCE_TEMPLATE || '{base_url}/volume{volume_2}/capitolo{source_chapter_2}/{page_padded}.{extension}' }}
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      IMAGE_EXTENSIONS: "jpg,jpeg"
      WEBP_QUALITY: "82"
      IMAGE_STRATEGY: "best-size"
      STOP_AFTER_MISSING: "3"
      IMPORT_DELAY: "0.25"
      IMPORT_TIMEOUT: "15"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Mass import One Punch Man archive using source volume/capitolo paths
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            EXTRA_ARGS+=(--overwrite)
          fi
          python scripts/import_opm_archive_to_r2.py \
            --source-base-url "$OPM_AUTHORIZED_MANGA_BASE_URL" \
            --source-template "$OPM_AUTHORIZED_MANGA_SOURCE_TEMPLATE" \
            --from-source-volume "${{ github.event.inputs.from_source_volume }}" \
            --to-source-volume "${{ github.event.inputs.to_source_volume }}" \
            --total-chapters "${{ github.event.inputs.total_chapters }}" \
            --max-source-chapters-per-volume "${{ github.event.inputs.max_source_chapters_per_volume }}" \
            --extensions "$IMAGE_EXTENSIONS" \
            --max-pages "${{ github.event.inputs.max_pages }}" \
            --min-pages "${{ github.event.inputs.min_pages }}" \
            --stop-after-missing "$STOP_AFTER_MISSING" \
            --webp-quality "$WEBP_QUALITY" \
            --image-strategy "$IMAGE_STRATEGY" \
            --i-confirm-rights \
            "${EXTRA_ARGS[@]}"

      - name: Commit JSON manifest changes only
        id: commit_json
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/content; then
            echo "No JSON manifest changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/content
          git commit -m "Mass import One Punch Man archive manifest"
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 5))
          done
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Deploy Cloudflare Worker after mass import
        if: steps.commit_json.outputs.pushed == 'true'
        run: npx wrangler deploy
