name: Mass Import Archive to R2

on:
  workflow_dispatch:
    inputs:
      from_chapter:
        description: "First chapter to import."
        required: true
        default: "1"
        type: string
      to_chapter:
        description: "Last chapter to import."
        required: true
        default: "1185"
        type: string
      batch_size:
        description: "How many chapters to process before committing JSON. Smaller = safer."
        required: false
        default: "20"
        type: string
      max_pages:
        description: "Maximum pages to try per chapter."
        required: false
        default: "45"
        type: string
      min_pages:
        description: "Minimum pages required before accepting a chapter."
        required: false
        default: "3"
        type: string
      webp_quality:
        description: "WebP quality used only when WebP is smaller or forced."
        required: false
        default: "82"
        type: string
      image_strategy:
        description: "best-size keeps JPG/JPEG when WebP is larger. Options: best-size, webp, original."
        required: false
        default: "best-size"
        type: choice
        options:
          - best-size
          - webp
          - original
      overwrite:
        description: "Overwrite existing manifest/R2 objects if chapters already exist."
        required: false
        default: false
        type: boolean
      stop_on_error:
        description: "Stop the mass import at the first failed/incomplete chapter."
        required: false
        default: false
        type: boolean
      pause_seconds_between_batches:
        description: "Pause between committed batches."
        required: false
        default: "10"
        type: string

permissions:
  contents: write

concurrency:
  group: r2-import-runs
  cancel-in-progress: false

jobs:
  mass-import:
    name: Import archive to R2, commit JSON only
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      AUTHORIZED_MANGA_BASE_URL: ${{ vars.AUTHORIZED_MANGA_BASE_URL }}
      AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.AUTHORIZED_MANGA_SOURCE_TEMPLATE }}
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      IMAGE_EXTENSIONS: "jpg,jpeg"
      STOP_AFTER_MISSING: "3"
      IMPORT_DELAY: "0.15"
      IMPORT_TIMEOUT: "15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate configuration
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTHORIZED_MANGA_BASE_URL:-}" ]; then
            echo "Missing repository variable AUTHORIZED_MANGA_BASE_URL."
            exit 1
          fi
          if [ "${I_CONFIRM_RIGHTS:-}" != "true" ]; then
            echo "I_CONFIRM_RIGHTS must be true."
            exit 1
          fi
          if [ -z "${R2_BUCKET_NAME:-}" ] || [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing R2_BUCKET_NAME or R2_PUBLIC_BASE_URL repository variable."
            exit 1
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, or CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi

      - name: Mass import archive in committed batches
        shell: bash
        run: |
          set -euo pipefail

          FROM_CHAPTER="${{ github.event.inputs.from_chapter }}"
          TO_CHAPTER="${{ github.event.inputs.to_chapter }}"
          BATCH_SIZE="${{ github.event.inputs.batch_size }}"
          MAX_PAGES="${{ github.event.inputs.max_pages }}"
          MIN_PAGES="${{ github.event.inputs.min_pages }}"
          WEBP_QUALITY="${{ github.event.inputs.webp_quality }}"
          IMAGE_STRATEGY="${{ github.event.inputs.image_strategy }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"
          STOP_ON_ERROR="${{ github.event.inputs.stop_on_error }}"
          PAUSE_SECONDS="${{ github.event.inputs.pause_seconds_between_batches }}"

          if ! [[ "$FROM_CHAPTER" =~ ^[0-9]+$ && "$TO_CHAPTER" =~ ^[0-9]+$ && "$BATCH_SIZE" =~ ^[0-9]+$ ]]; then
            echo "from_chapter, to_chapter and batch_size must be numeric."
            exit 1
          fi
          if [ "$FROM_CHAPTER" -lt 1 ] || [ "$TO_CHAPTER" -lt "$FROM_CHAPTER" ]; then
            echo "Invalid chapter range: $FROM_CHAPTER-$TO_CHAPTER"
            exit 1
          fi
          if [ "$BATCH_SIZE" -lt 1 ]; then
            echo "batch_size must be >= 1."
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          commit_json_changes() {
            local start="$1"
            local end="$2"

            if git diff --quiet -- public/content; then
              echo "No JSON manifest changes for chapters ${start}-${end}."
              return 0
            fi

            # Safety guard: stage JSON manifests only. Never stage images, reports or temp files.
            git add public/content/index.json public/content/manifest.json public/content/volumes/*.json

            if git diff --cached --quiet; then
              echo "No staged JSON changes for chapters ${start}-${end}."
              return 0
            fi

            git commit -m "Mass import manga chapters ${start}-${end} manifests"

            for attempt in 1 2 3; do
              echo "Push attempt $attempt for chapters ${start}-${end}"
              if git push; then
                return 0
              fi
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
              sleep $((attempt * 5))
            done

            echo "Failed to push after retries for chapters ${start}-${end}."
            exit 1
          }

          EXTRA_ARGS=()
          if [ "$OVERWRITE" = "true" ]; then
            EXTRA_ARGS+=(--overwrite)
          fi
          if [ "$STOP_ON_ERROR" = "true" ]; then
            EXTRA_ARGS+=(--stop-on-error)
          fi

          CURRENT="$FROM_CHAPTER"
          while [ "$CURRENT" -le "$TO_CHAPTER" ]; do
            END=$((CURRENT + BATCH_SIZE - 1))
            if [ "$END" -gt "$TO_CHAPTER" ]; then
              END="$TO_CHAPTER"
            fi

            echo "============================================================"
            echo "Importing batch: chapters ${CURRENT}-${END}"
            echo "============================================================"

            python scripts/import_all_to_r2.py \
              --from-chapter "$CURRENT" \
              --to-chapter "$END" \
              --extensions "$IMAGE_EXTENSIONS" \
              --max-pages "$MAX_PAGES" \
              --min-pages "$MIN_PAGES" \
              --stop-after-missing "$STOP_AFTER_MISSING" \
              --timeout "$IMPORT_TIMEOUT" \
              --delay "$IMPORT_DELAY" \
              --webp-quality "$WEBP_QUALITY" \
              --image-strategy "$IMAGE_STRATEGY" \
              --i-confirm-rights \
              "${EXTRA_ARGS[@]}"

            commit_json_changes "$CURRENT" "$END"

            CURRENT=$((END + 1))
            if [ "$CURRENT" -le "$TO_CHAPTER" ]; then
              echo "Pausing ${PAUSE_SECONDS}s before next batch."
              sleep "$PAUSE_SECONDS"
            fi
          done

          echo "Mass import finished for chapters ${FROM_CHAPTER}-${TO_CHAPTER}."

      - name: Final safety check - no images staged
        shell: bash
        run: |
          set -euo pipefail
          if git status --short | grep -E '^(A|M|\?\?)\s+(public/manga/|.*\.(jpg|jpeg|png|webp|gif))' || true; then
            echo "Image files are present as working tree changes. They were not committed. Review .gitignore if needed."
          else
            echo "No image files staged or pending in Git."
          fi
