name: Manual Import Single Chapter to R2

on:
  workflow_dispatch:
    inputs:
      chapter:
        description: "Chapter number to import, for example 1176."
        required: true
        type: string
      max_pages:
        description: "Maximum pages to try."
        required: false
        default: "45"
        type: string
      min_pages:
        description: "Minimum pages required before accepting the chapter."
        required: false
        default: "3"
        type: string
      webp_quality:
        description: "WebP quality, 1-100."
        required: false
        default: "90"
        type: string
      overwrite:
        description: "Overwrite manifest/R2 objects if the chapter already exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-import-single-chapter-to-r2-${{ github.event.inputs.chapter }}
  cancel-in-progress: false

jobs:
  import:
    name: Import one chapter, upload images to R2, commit JSON only
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AUTHORIZED_MANGA_BASE_URL: ${{ vars.AUTHORIZED_MANGA_BASE_URL }}
      AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.AUTHORIZED_MANGA_SOURCE_TEMPLATE }}
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      IMAGE_EXTENSIONS: "jpg,jpeg"
      STOP_AFTER_MISSING: "3"
      IMPORT_DELAY: "0.25"
      IMPORT_TIMEOUT: "15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate configuration
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTHORIZED_MANGA_BASE_URL:-}" ]; then
            echo "Missing repository variable AUTHORIZED_MANGA_BASE_URL."
            exit 1
          fi
          if [ "${I_CONFIRM_RIGHTS:-}" != "true" ]; then
            echo "I_CONFIRM_RIGHTS must be true."
            exit 1
          fi
          if [ -z "${R2_BUCKET_NAME:-}" ] || [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing R2_BUCKET_NAME or R2_PUBLIC_BASE_URL repository variable."
            exit 1
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, or CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi

      - name: Import requested chapter to R2
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER_INPUT="${{ github.event.inputs.chapter }}"
          MAX_PAGES_INPUT="${{ github.event.inputs.max_pages }}"
          MIN_PAGES_INPUT="${{ github.event.inputs.min_pages }}"
          WEBP_QUALITY_INPUT="${{ github.event.inputs.webp_quality }}"
          OVERWRITE_INPUT="${{ github.event.inputs.overwrite }}"

          EXTRA_ARGS=()
          if [ "$OVERWRITE_INPUT" = "true" ]; then
            EXTRA_ARGS+=(--overwrite)
          fi

          python scripts/import_history_to_r2.py \
            --chapter "$CHAPTER_INPUT" \
            --extensions "$IMAGE_EXTENSIONS" \
            --max-pages "$MAX_PAGES_INPUT" \
            --min-pages "$MIN_PAGES_INPUT" \
            --webp-quality "$WEBP_QUALITY_INPUT" \
            --i-confirm-rights \
            "${EXTRA_ARGS[@]}"

      - name: Commit JSON manifest changes only
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/content; then
            echo "No JSON manifest changes. No commit and no Cloudflare deploy."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Safety guard: stage manifests only. Never stage downloaded images.
          git add public/content/index.json public/content/manifest.json public/content/volumes/*.json

          if git diff --cached --quiet; then
            echo "No staged JSON changes."
            exit 0
          fi

          git commit -m "Import manga chapter ${{ github.event.inputs.chapter }} manifest"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries."
          exit 1
