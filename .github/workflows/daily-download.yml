name: Scan New Chapter to R2 Hourly

on:
  schedule:
    # Every hour. This job uploads images to R2 and commits only JSON manifests if a new chapter is found.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      chapter:
        description: "Optional chapter number to force-check. Empty = latest manifest chapter + 1."
        required: false
        type: string
      scan_ahead:
        description: "How many future chapters to probe starting from latest+1."
        required: false
        default: "3"
        type: string
      max_pages:
        description: "Maximum pages to try per chapter."
        required: false
        default: "45"
        type: string
      min_pages:
        description: "Minimum pages required before accepting a chapter."
        required: false
        default: "3"
        type: string

permissions:
  contents: write

concurrency:
  group: scan-new-chapter-to-r2-hourly
  cancel-in-progress: true

jobs:
  scan:
    name: Check next chapter, upload to R2, commit JSON only
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AUTHORIZED_MANGA_BASE_URL: ${{ vars.AUTHORIZED_MANGA_BASE_URL }}
      AUTHORIZED_MANGA_SOURCE_TEMPLATE: ${{ vars.AUTHORIZED_MANGA_SOURCE_TEMPLATE }}
      I_CONFIRM_RIGHTS: ${{ vars.I_CONFIRM_RIGHTS }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      IMAGE_EXTENSIONS: "jpg,jpeg"
      WEBP_QUALITY: "82"
      IMAGE_STRATEGY: "best-size"
      STOP_AFTER_MISSING: "3"
      IMPORT_DELAY: "0.25"
      IMPORT_TIMEOUT: "15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTHORIZED_MANGA_BASE_URL:-}" ]; then
            echo "Missing repository variable AUTHORIZED_MANGA_BASE_URL. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${I_CONFIRM_RIGHTS:-}" != "true" ]; then
            echo "I_CONFIRM_RIGHTS is not true. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${R2_BUCKET_NAME:-}" ] || [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing R2_BUCKET_NAME or R2_PUBLIC_BASE_URL repository variable. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, or CLOUDFLARE_ACCOUNT_ID secret. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Import next chapter to R2
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHAPTER_INPUT="${{ github.event.inputs.chapter || '' }}"
          SCAN_AHEAD_INPUT="${{ github.event.inputs.scan_ahead || '3' }}"
          MAX_PAGES_INPUT="${{ github.event.inputs.max_pages || '45' }}"
          MIN_PAGES_INPUT="${{ github.event.inputs.min_pages || '3' }}"

          EXTRA_ARGS=()
          if [ -n "$CHAPTER_INPUT" ]; then
            EXTRA_ARGS+=(--chapter "$CHAPTER_INPUT")
          else
            EXTRA_ARGS+=(--scan-ahead "$SCAN_AHEAD_INPUT")
          fi

          python scripts/import_new_chapter_to_r2.py \
            --max-pages "$MAX_PAGES_INPUT" \
            --min-pages "$MIN_PAGES_INPUT" \
            --webp-quality "$WEBP_QUALITY" \
            --image-strategy "$IMAGE_STRATEGY" \
            --i-confirm-rights \
            "${EXTRA_ARGS[@]}"

      - name: Commit JSON manifest changes only
        if: steps.config.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/content; then
            echo "No JSON manifest changes. No commit and no Cloudflare deploy."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Safety guard: never stage image binaries from any path.
          git add public/content/index.json public/content/manifest.json public/content/volumes/*.json

          if git diff --cached --quiet; then
            echo "No staged JSON changes."
            exit 0
          fi

          git commit -m "Import new manga chapter manifest"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries."
          exit 1
